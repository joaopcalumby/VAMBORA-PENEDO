# Horários de partida por linha (PRD §RF1.2).
#
# Cada chave de primeiro nível é o NÚMERO da linha (string, como aparece
# nas properties dos arquivos GeoJSON: "01", "02", "BAL"...).
#
# Para cada linha, três listas por tipo de dia:
#   weekday         — dias úteis
#   saturday        — sábados
#   sunday_holiday  — domingos e feriados
#
# Horários em formato "HH:MM" 24h. Lista vazia significa "não opera nesse dia".
#
# Lógica de rodízio dos ônibus (um único veículo):
#   Ciclo: L1 → L2 → L1 → L3 → L1 → L2 → ... (intervalo de 20min)
#   Início: 05:50 | Fim: 20:00 (último horário de L1)
#   Apenas dias úteis (fins de semana a definir).
#
# Van: saídas a cada ~50min, das 05:50 às ~17h (weekday + sábado).
# Balsa: saídas a cada 1h, das 05:30 às 22:30 (todos os dias).

# =====================================================================
# ÔNIBUS — somente dias úteis
# =====================================================================

"01":
  weekday:
    - "05:50"
    - "06:30"
    - "07:10"
    - "07:50"
    - "08:30"
    - "09:10"
    - "09:50"
    - "10:30"
    - "11:10"
